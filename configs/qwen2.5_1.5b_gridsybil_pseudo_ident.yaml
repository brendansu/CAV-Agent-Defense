model_name: Qwen/Qwen2.5-1.5B-Instruct
jsonl_dir: data/processed/jsonl/gridsybil_pseudo_ident_balanced_a
output_dir: outputs/qwen2.5-1.5b-gridsybil-pseudo-ident

max_seq_len: 4160
reserve_answer_tokens: 320
entity_sort_policy: msgs_lifetime_distance
simulate_budget_cutoff: true
add_eos_token: true

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
num_train_epochs: 1.0
max_steps: 300
learning_rate: 1.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.03

logging_steps: 50
eval_strategy: steps
eval_steps: 200
save_strategy: steps
save_steps: 200
save_total_limit: 2
max_eval_samples: 512
report_to: []
