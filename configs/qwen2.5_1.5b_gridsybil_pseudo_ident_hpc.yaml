# HPC / large-GPU profile (~80GB per device): higher per-device batch than local smoke.
# Global batch per optimizer step ≈ per_device_train_batch_size × WORLD_SIZE × gradient_accumulation_steps
# Example: batch=8, 4 GPUs, accum=2 → 64 samples/step (vs local 1×8=8 on one GPU).
# If loss spikes, try a lower learning_rate or reduce batch before accum.
model_name: Qwen/Qwen2.5-1.5B-Instruct
jsonl_dir: /scratch/YOUR_USERNAME/veremi_collusion/data/gridsybil_pseudo_ident_balanced_a
output_dir: /scratch/YOUR_USERNAME/veremi_collusion/outputs/qwen2.5-1.5b-pseudo-ident-balanced-a

max_seq_len: 4160
reserve_answer_tokens: 320
entity_sort_policy: msgs_lifetime_distance
simulate_budget_cutoff: true
add_eos_token: true

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

per_device_train_batch_size: 4
per_device_eval_batch_size: 2
gradient_accumulation_steps: 4
num_train_epochs: 1.0
max_steps: -1
learning_rate: 1.5e-4
lr_scheduler_type: cosine
warmup_ratio: 0.03

logging_steps: 50
eval_strategy: steps
eval_steps: 200
save_strategy: steps
save_steps: 200
save_total_limit: 3
max_eval_samples: 2048
report_to: []

prompt_variant: default # default / strict_empty
