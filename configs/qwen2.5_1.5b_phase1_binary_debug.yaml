model_name: Qwen/Qwen2.5-1.5B-Instruct

# Phase 1 binary task (DEBUG): JSONL source and output directory
jsonl_dir: data/processed/jsonl/phase1_binary_debug
output_dir: outputs/qwen2.5-1.5b-phase1-binary-debug

# Tokenization / sequence length
max_seq_len: 512

# Optimizer / schedule
learning_rate: 1.0e-4
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.03

# Batch / accumulation
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8

# Logging / eval / checkpoints
logging_steps: 50
evaluation_strategy: steps
eval_steps: 500
save_strategy: steps
save_steps: 500
save_total_limit: 2

# LoRA config
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

# Reporting (empty list => no external loggers)
report_to: []

